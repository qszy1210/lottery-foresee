name: Lottery Notify

on:
  schedule:
    # 北京时间每天 10:00（UTC 02:00）触发
    # 默认 auto 模式下每天会同时推送双色球 + 大乐透两组预测，
    # 提前覆盖最近一期开奖（SSQ：二/四/日，DLT：一/三/六）
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      lottery:
        description: '彩种 (auto=每天都发双色球+大乐透；draw_day=仅当天开奖的彩种)'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - ssq
          - dlt
          - both
          - draw_day
      recommend_count:
        description: '推荐组数'
        required: false
        default: '5'
      dry_run:
        description: '只生成不发送 (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show schedule context
        run: |
          echo "Current UTC: $(date -u)"
          echo "Beijing:     $(TZ=Asia/Shanghai date)"

      - name: Run notification script
        working-directory: backend
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          LOTTERY_TYPE: ${{ github.event.inputs.lottery || 'auto' }}
          RECOMMEND_COUNT: ${{ github.event.inputs.recommend_count || '5' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python -m app.scripts.notify_predictions --dry-run
          else
            python -m app.scripts.notify_predictions
          fi
